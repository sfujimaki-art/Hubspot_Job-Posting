# 求人デイリー (WBS 1.11.9): HR求人差分 + AW求人巡回(2フェーズ)
# AW求人はダウンロード生成待ち(最大20分)があるため create/collect の2フェーズで回す:
#   aw-create : login→「データを作成する」click(生成トリガーのみ, 待たない)→pending queueへ
#   aw-collect: login→生成済みを短時間ポーリングDL→LISTING upsert (待機なし)
# これで生成待ちを run 間に逃がし、1runが timeout に収まる。
#
# 状態(pending queue / セッション)は actions/cache で run 間保持。
# Secrets は応募連携workflowと共通。

name: Job Daily

on:
  schedule:
    - cron: "0 22 * * *"    # 毎日 22:00 UTC (= 07:00 JST) HR差分
    - cron: "20 22 * * *"   # 20分後に AW-collect (create→生成待ち→collect)
  workflow_dispatch:
    inputs:
      phase:
        description: "フェーズ (hr / aw-create / aw-collect)"
        default: "hr"
        type: choice
        options: ["hr", "aw-create", "aw-collect"]
      target_login_ids:
        description: "AW対象 login_id (カンマ区切り, 空=--from-active-deals)"
        default: ""
      limit:
        description: "AW処理社数上限 (空=無制限)"
        default: ""
      dry_run:
        description: "ドライラン"
        type: boolean
        default: true

concurrency:
  group: job-daily
  cancel-in-progress: false

jobs:
  job:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Restore state (pending queue + sessions)
        uses: actions/cache@v4
        with:
          path: data/job_application_sync
          key: jas-job-state-v1-${{ github.run_id }}
          restore-keys: |
            jas-job-state-v1-
      - name: Install deps + Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright==1.50.0 requests python-dotenv gspread google-auth google-auth-oauthlib openpyxl google-cloud-storage
          python -m playwright install --with-deps chromium chromium-headless-shell
      - name: Write SA json
        env:
          SA_JSON_CONTENT: ${{ secrets.GOOGLE_SA_JSON }}
        run: printf '%s' "$SA_JSON_CONTENT" > /tmp/sa.json
      - name: Job daily
        env:
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          HRHACKER_USER: ${{ secrets.HRHACKER_USER }}
          HRHACKER_PASS: ${{ secrets.HRHACKER_PASS }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
          GOOGLE_SA_JSON: /tmp/sa.json
          SHEETS_AUTH_MODE: sa
          JAS_SHEET_ID: ${{ secrets.JAS_SHEET_ID }}
          PYTHONIOENCODING: utf-8
          PHASE: ${{ inputs.phase || 'hr' }}
          TARGET: ${{ inputs.target_login_ids }}
          LIMIT: ${{ inputs.limit }}
        run: |
          FLAG=$([ "${{ inputs.dry_run }}" = "false" ] && echo "--actual" || echo "--dry-run")
          TGT=$([ -n "$TARGET" ] && echo "--target-login-ids $TARGET" || echo "--from-active-deals")
          LIM=$([ -n "$LIMIT" ] && echo "--limit $LIMIT" || echo "")
          case "$PHASE" in
            hr)
              python scripts/job_application_sync/hr_watcher.py $FLAG --skip-aw
              ;;
            aw-create)
              python scripts/job_application_sync/fetchers/aw_orchestrator.py \
                $TGT --phase create --parallel 2 $LIM
              ;;
            aw-collect)
              python scripts/job_application_sync/fetchers/aw_orchestrator.py \
                --phase collect $FLAG --parallel 2
              ;;
          esac

# 応募連携 定期バッチ (WBS 1.11.9 スコープ③)
# 5分ごとに集約シート(queue)を検知 → アカウント集約 → セッション再利用fetch →
# HubSpot APPOINTMENT登録。放置ゼロ(失敗はリトライ3回→Slack報告)。
#
# 単一インスタンス: concurrency group で多重起動を防止(GitHub runnerは毎回ephemeralなので
#   ファイルロックでなく concurrency が実効的な単一インスタンス機構)。
# 状態永続化: state_sync で GCS から台帳/セッションを pull → 実行 → push。
#
# 必要 Secrets (会社publicリポに登録):
#   HUBSPOT_ACCESS_TOKEN / HRHACKER_USER / HRHACKER_PASS
#   GOOGLE_SA_JSON (シート読取用SA) / JAS_APPLICANT_QUEUE_SHEET_ID / JAS_SHEET_ID
#   JAS_GCS_BUCKET (状態永続化先) / SLACK_APPLICANT_ALERT_WEBHOOK
#
# ※ 媒体URL/シートID/トークンは直書きせず Secret 注入 (publicリポ方針)。

name: Applicant Sync

# cron は新規アカ×最短間隔で不発のため実質 GAS 外部トリガーで起動する(残置)。
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "動作 (sync/relink/reconcile/ichijitaiou/deal-assoc)"
        default: "sync"
        type: choice
        options: ["sync", "relink", "reconcile", "ichijitaiou", "deal-assoc"]
      media:
        description: "処理媒体 (AW/HR/BOTH) ※mode=sync時のみ"
        default: "BOTH"
        type: choice
        options: ["BOTH", "AW", "HR"]
      dry_run:
        description: "ドライラン (書込なし)"
        type: boolean
        default: true

concurrency:
  group: applicant-sync          # 単一インスタンス (重複runを直列化)
  cancel-in-progress: false      # 実行中は待つ (キャンセルしない)

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      # 状態永続化: GCS(請求先問題)の代わりに Actions cache で
      # 台帳(ledger)+AWセッション(storage_state)を run 間で保持。
      - name: Restore state (ledger + sessions)
        uses: actions/cache@v4
        with:
          path: data/job_application_sync
          key: jas-applicant-state-v2-${{ github.run_id }}
          restore-keys: |
            jas-applicant-state-v2-
      - name: Install deps + Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright==1.50.0 requests python-dotenv gspread google-auth google-auth-oauthlib openpyxl google-cloud-storage
          python -m playwright install --with-deps chromium chromium-headless-shell
      - name: Write SA json
        env:
          SA_JSON_CONTENT: ${{ secrets.GOOGLE_SA_JSON }}
        run: printf '%s' "$SA_JSON_CONTENT" > /tmp/sa.json   # env経由 (複数行secretをシェル展開で壊さない)
      - name: Applicant sync
        env:
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          HRHACKER_USER: ${{ secrets.HRHACKER_USER }}
          HRHACKER_PASS: ${{ secrets.HRHACKER_PASS }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
          GOOGLE_SA_JSON: /tmp/sa.json
          SHEETS_AUTH_MODE: sa   # Actionsは Service Account でシート読取 (要: 2シートをSAに共有)
          JAS_APPLICANT_QUEUE_SHEET_ID: ${{ secrets.JAS_APPLICANT_QUEUE_SHEET_ID }}
          JAS_SHEET_ID: ${{ secrets.JAS_SHEET_ID }}
          SLACK_APPLICANT_ALERT_WEBHOOK: ${{ secrets.SLACK_APPLICANT_ALERT_WEBHOOK }}
          PYTHONIOENCODING: utf-8
          MODE: ${{ inputs.mode || 'sync' }}
          MEDIA: ${{ inputs.media || 'BOTH' }}
        run: |
          # 状態(台帳/セッション)は actions/cache で保持 (GCS請求先問題の代替)。
          FLAG=$([ "${{ inputs.dry_run }}" = "true" ] && echo "--dry-run" || echo "--actual")
          if [ "$MODE" = "deal-assoc" ]; then
            # LISTING→Deal 関連付け (§21.1 要件漏れ是正)。ichijitaiouより前に走る想定。
            python scripts/job_application_sync/sync_deal_association.py $FLAG
          elif [ "$MODE" = "ichijitaiou" ]; then
            # 1次対応連動 (Deal→LISTING)。sync_ichijitaiou は別スクリプト。
            python scripts/job_application_sync/sync_ichijitaiou.py $FLAG
          else
            case "$MODE" in
              relink)    EXTRA="--relink" ;;
              reconcile) EXTRA="--reconcile" ;;
              # sync: GAS queue が行番号座礁で凍結したため、シート1直読みへ切替
              # (2026-07-21)。台帳(row_id=内容ハッシュ)で重複防止・行削除に強い。
              # AW突合は列解決の是正で復活(2026-07-22)→HR+AW両取込(--media BOTH)。
              # AWは MAX_AW_ACCOUNTS_PER_RUN で1run社数をcap(一斉ログインBAN対策)。
              *)         EXTRA="--source sheet1 --media BOTH" ;;
            esac
            python scripts/job_application_sync/applicant_sync.py $FLAG $EXTRA
          fi
